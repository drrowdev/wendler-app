name: iOS build

# Manual-only trigger. iOS builds are not part of the per-push CI pipeline
# because the WKWebView loads the deployed Static Web App directly, so
# normal feature changes never need a rebuild. Trigger this workflow when
# `apps/ios/capacitor.config.ts`, `apps/ios/package.json`, or native iOS
# code changes — or just whenever the AltStore-installed app is nearing
# its 7-day signing expiry and you want a fresh `.ipa` to install.
on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'altstore-unsigned'
        type: choice
        options:
          - altstore-unsigned
          # - testflight  # Enable when you switch to TestFlight (see apps/ios/README.md)

jobs:
  build:
    name: Build .ipa
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false

      - name: Generate Capacitor iOS project
        working-directory: apps/ios
        run: |
          # Generate ios/App/ fresh (gitignored, regenerated every build).
          pnpm exec cap add ios || pnpm exec cap sync ios
          pnpm exec cap sync ios

      - name: Install CocoaPods deps
        working-directory: apps/ios/ios/App
        run: pod install

      - name: Build unsigned archive
        if: ${{ inputs.build_mode == 'altstore-unsigned' }}
        working-directory: apps/ios/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive

      - name: Package unsigned .ipa
        if: ${{ inputs.build_mode == 'altstore-unsigned' }}
        run: |
          # AltStore re-signs with the user's free Apple ID, so we ship an
          # unsigned .ipa here. Standard "Payload/" zip layout — AltStore
          # accepts it directly via the AltServer tray.
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr wendler-ios-unsigned.ipa Payload
          ls -la wendler-ios-unsigned.ipa

      - name: Upload unsigned .ipa artifact
        if: ${{ inputs.build_mode == 'altstore-unsigned' }}
        uses: actions/upload-artifact@v4
        with:
          name: wendler-ios-unsigned
          path: ${{ runner.temp }}/wendler-ios-unsigned.ipa
          retention-days: 14

